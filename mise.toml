[tools]
# Docs
"github:donaldgifford/docz" = "0.0.12"

# Go Packages
"go:github.com/spf13/cobra-cli" = "1.3.0"
"go:golang.org/x/tools/cmd/goimports" = "0.43.0"
"go:github.com/vektra/mockery/v2" = "2.53.6"
"go:github.com/google/go-licenses" = "1.6.0"

# renovate: datasource=github-tags depName=golang/go
go = "1.26.2"
# renovate: datasource=github-releases depName=DavidAnson/markdownlint-cli2
markdownlint-cli2 = "0.22.1"
# renovate: datasource=github-releases depName=google/yamlfmt
yamlfmt = "0.21.0"
# renovate: datasource=github-tags depName=adrienverge/yamllint
yamllint = "1.38.0"
# renovate: datasource=github-releases depName=mikefarah/yq
yq = "4.48.1"
# renovate: datasource=npm depName=prettier
prettier = "3.8.3"
# renovate: datasource=github-releases depName=segmentio/golines
golines = "0.13.0"
# renovate: datasource=github-releases depName=golangci/golangci-lint
golangci-lint = "2.11.4"
# renovate: datasource=github-releases depName=orhun/git-cliff
git-cliff = "2.13.1"

# Repo utilities
just = "latest"

# Formatters and linters
actionlint = "latest"

# tools
jq = "latest"

# Security
syft = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

[env]
GOPRIVATE = "github.com/donaldgifford/*"
