# spt integration-test stack.
#
# Use via `just test-integration`, which brings the services up with
# `--wait` (blocks until every healthcheck passes), runs the test
# suite with the `integration` build tag, then tears the stack down
# with `down -v` (volume cleanup keeps the test fixture deterministic).
#
# Ports are fixed (not :0) so tests can hit known addresses. If two
# integration runs ever overlap on one machine, override the host
# ports via COMPOSE_PROJECT_NAME isolation or run them sequentially.

services:
  postgres:
    image: postgres:17-alpine
    container_name: spt-it-postgres
    environment:
      POSTGRES_USER: spt
      POSTGRES_PASSWORD: spt
      POSTGRES_DB: spt
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spt -d spt"]
      interval: 2s
      timeout: 5s
      retries: 15

  valkey:
    image: valkey/valkey:8-alpine
    container_name: spt-it-valkey
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "PING"]
      interval: 2s
      timeout: 5s
      retries: 15

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: spt-it-meilisearch
    environment:
      MEILI_MASTER_KEY: spt-integration-key
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    ports:
      - "127.0.0.1:57700:7700"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 2s
      timeout: 5s
      retries: 15
