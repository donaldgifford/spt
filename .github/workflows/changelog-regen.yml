---
name: Changelog Regen
on:
  push:
    branches: [main]
  workflow_dispatch:

# Skip the run for any chore commit and must be the last commit. Chores
# are not changelog-worthy under our cliff.toml grouping (chore(changelog),
# chore(release), chore(deps*), chore(pr), chore(pull) are explicitly skipped,
# and the remaining chores land under "Miscellaneous Tasks" which we treat as
# noise for the regen workflow). This also subsumes the original loop
# guard for chore(changelog) auto-syncs.
jobs:
  regen:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          # Use the default GITHUB_TOKEN so the push uses bot credentials;
          # `permissions: contents: write` above is required for it to push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up mise (for git-cliff)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Regenerate CHANGELOG.md
        run: |
          git fetch --tags origin
          git-cliff -o CHANGELOG.md

      - name: Commit and push if changed
        run: |-
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md is up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): Auto-sync"
          git push origin HEAD:main
